<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      background-image: url("./flappy-bird-assets/background-day.png");
      background-repeat: repeat;
      background-size: auto;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    #screenRoot {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .menuScreen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 40px;
      z-index: 5;
      position: relative;
    }

    .menuTitle {
      color: #ffffff;
      font-size: 48px;
      margin-bottom: 16px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
    }

    .menuLogo {
      width: min(50vw, 900px);
      height: auto;
      margin-bottom: 20px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: none;
    }

    .menuButton {
      border: 2px solid #ffffff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .menuButton.primary {
      font-size: 40px;
      padding: 24px 44px;
      background: #58D858;
      color: #ffffff;
    }

    .menuButton.secondary {
      font-size: 32px;
      padding: 20px 36px;
      background: rgba(0, 0, 0, 0.45);
      color: #ffffff;
    }

    #mainMenu .menuControlsRow {
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: clamp(20px, 5vw, 64px);
      padding: 0 24px;
    }

    #mainMenu .menuPinchArt {
      width: clamp(144px, 24vw, 360px);
      height: auto;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
    }

    #mainMenu .menuButtonGrid {
      width: min(33vw, 760px);
      min-width: 320px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    #mainMenu #startGameButton {
      width: 100%;
      padding: 24px 36px;
      line-height: 1;
    }

    #mainMenu .menuSecondaryRow {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 14px;
      width: 100%;
    }

    #mainMenu .menuSecondaryRow .menuButton {
      width: 100%;
      padding: 18px 16px;
      font-size: clamp(24px, 2vw, 32px);
      line-height: 1;
    }

    @media (max-width: 900px) {
      #mainMenu .menuControlsRow {
        gap: 16px;
      }

      #mainMenu .menuButtonGrid {
        width: min(88vw, 620px);
        min-width: 0;
      }

      #mainMenu .menuPinchArt {
        width: clamp(112px, 20vw, 192px);
      }
    }

    @media (max-width: 640px) {
      #mainMenu .menuControlsRow {
        padding: 0 10px;
      }

      #mainMenu .menuPinchArt {
        display: none;
      }
    }

    .menuInstruction {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      z-index: 12;
      pointer-events: none;
    }

    #gameArea {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-color: transparent;
    }

    #gameCanvas {
      display: block;
      image-rendering: pixelated;
    }

    #cameraFeed {
      position: fixed;
      top: 16px;
      left: 16px;
      width: min(320px, 30vw);
      aspect-ratio: 4 / 3;
      border: 2px solid #ffffff;
      box-sizing: border-box;
      overflow: hidden;
      z-index: 30;
    }

    #video,
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1); /* mirror like a selfie */
    }

    #video {
      object-fit: cover;
    }

    #canvas {
      pointer-events: none;
    }

    #hud {
      position: fixed;
      top: 268px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
      color: #fff;
      z-index: 20;
      background: rgba(0, 0, 0, 0.35);
      border: 2px solid #ffffff;
      border-radius: 8px;
      padding: 10px;
    }

    .hudRow {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    #cameraInstructions {
      position: fixed;
      top: 264px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 4px;
      font-size: 18px;
      font-weight: bold;
      color: #fff;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
      z-index: 25;
      background: rgba(0, 0, 0, 0.35);
      border: 2px solid #ffffff;
      border-radius: 8px;
      padding: 8px;
    }
  </style>
</head>
<body>
  <div id="cameraInstructions">
    <div>Get into frame</div>
    <div>Pinch to select</div>
  </div>
  <script type="module" src="src/main.js"></script>
</body>
</html>
