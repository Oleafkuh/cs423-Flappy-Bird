<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      background-image: url("./flappy-bird-assets/background-day.png");
      background-repeat: repeat;
      background-size: auto;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    #screenRoot {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .menuScreen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      z-index: 5;
      position: relative;
    }

    .menuTitle {
      color: #ffffff;
      font-size: 48px;
      margin-bottom: 16px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
    }

    .menuButton {
      border: 2px solid #ffffff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .menuButton.primary {
      font-size: 30px;
      padding: 18px 34px;
      background: #58D858;
      color: #ffffff;
    }

    .menuButton.secondary {
      font-size: 18px;
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.45);
      color: #ffffff;
    }

    .menuInstruction {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      z-index: 12;
      pointer-events: none;
    }

    #gameArea {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-color: transparent;
    }

    #gameCanvas {
      display: block;
      image-rendering: pixelated;
    }

    #cameraFeed {
      position: fixed;
      top: 16px;
      left: 16px;
      width: min(320px, 30vw);
      aspect-ratio: 4 / 3;
      border: 2px solid #ffffff;
      box-sizing: border-box;
      overflow: hidden;
      z-index: 30;
    }

    #video,
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1); /* mirror like a selfie */
    }

    #video {
      object-fit: cover;
    }

    #canvas {
      pointer-events: none;
    }

    #hud {
      position: fixed;
      top: 268px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
      color: #fff;
      z-index: 20;
      background: rgba(0, 0, 0, 0.35);
      border: 2px solid #ffffff;
      border-radius: 8px;
      padding: 10px;
    }

    .hudRow {
      display: flex;
      gap: 8px;
      align-items: center;
    }

    .hudLabel {
      color: rgb(255, 255, 255);
    }
  </style>
</head>
<body>
  <script type="module" src="src/main.js"></script>
</body>
</html>
