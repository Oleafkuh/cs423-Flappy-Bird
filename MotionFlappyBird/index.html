<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Flappy Bird</title>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/hands/hands.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/camera_utils/camera_utils.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/@mediapipe/drawing_utils/drawing_utils.js"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background-color: #000;
      background-image: url("./flappy-bird-assets/background-day.png");
      background-repeat: repeat;
      background-size: auto;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      position: relative;
    }

    #screenRoot {
      position: relative;
      width: 100%;
      height: 100%;
    }

    .menuScreen {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      gap: 24px;
      z-index: 5;
      position: relative;
    }

    .menuTitle {
      color: #ffffff;
      font-size: 48px;
      margin-bottom: 16px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
    }

    .menuLogo {
      width: min(50vw, 900px);
      height: auto;
      margin-bottom: 20px;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      filter: none;
    }

    .menuButton {
      border: 2px solid #ffffff;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
    }

    .menuButton.primary {
      font-size: 30px;
      padding: 18px 34px;
      background: #58D858;
      color: #ffffff;
    }

    .menuButton.secondary {
      font-size: 18px;
      padding: 10px 20px;
      background: rgba(0, 0, 0, 0.45);
      color: #ffffff;
    }

    .menuInstruction {
      position: fixed;
      bottom: 24px;
      left: 50%;
      transform: translateX(-50%);
      color: #ffffff;
      font-size: 34px;
      font-weight: 900;
      letter-spacing: 1px;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.8);
      z-index: 12;
      pointer-events: none;
    }

    #gameArea {
      width: 100%;
      height: 100%;
      display: flex;
      justify-content: center;
      align-items: center;
      overflow: hidden;
      background-color: transparent;
    }

    #gameCanvas {
      display: block;
      image-rendering: pixelated;
    }

    #cameraFeed {
      position: fixed;
      top: 16px;
      left: 16px;
      width: min(320px, 30vw);
      aspect-ratio: 4 / 3;
      border: 2px solid #ffffff;
      box-sizing: border-box;
      overflow: hidden;
      z-index: 30;
    }

    #video,
    #canvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      transform: scaleX(-1); /* mirror like a selfie */
    }

    #video {
      object-fit: cover;
    }

    #canvas {
      pointer-events: none;
    }

    #hud {
      position: fixed;
      top: 268px;
      left: 16px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      align-items: flex-start;
      font-size: 28px;
      font-weight: bold;
      text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.7);
      color: #fff;
      z-index: 20;
      background: rgba(0, 0, 0, 0.35);
      border: 2px solid #ffffff;
      border-radius: 8px;
      padding: 10px;
    }

    .userStatus {
      color: #ffffff;
      font-size: 20px;
      margin-bottom: 10px;
      text-shadow: 1px 1px 2px rgba(0, 0, 0, 0.7);
      background: rgba(0, 0, 0, 0.3);
      padding: 8px 16px;
      border-radius: 8px;
    }

    .loginForm {
      display: flex;
      flex-direction: column;
      gap: 16px;
      width: min(400px, 90vw);
      background: rgba(0, 0, 0, 0.5);
      padding: 24px;
      border-radius: 12px;
      border: 2px solid #ffffff;
    }

    .loginInput {
      padding: 12px;
      font-size: 18px;
      border: 2px solid #58D858;
      border-radius: 6px;
      background: rgba(255, 255, 255, 0.9);
      color: #000;
    }

    .loginInput:focus {
      outline: none;
      border-color: #ffffff;
    }

    .loginButtons {
      display: flex;
      gap: 12px;
      justify-content: center;
      flex-wrap: wrap;
    }

    .loginMessage {
      text-align: center;
      font-size: 16px;
      margin-top: 10px;
      min-height: 24px;
      display: none;
    }

    .leaderboardTable {
      width: min(600px, 90vw);
      background: rgba(0, 0, 0, 0.5);
      border-radius: 12px;
      border: 2px solid #ffffff;
      overflow: hidden;
      margin-bottom: 20px;
    }

    .leaderboardHeader {
      display: flex;
      background: rgba(88, 216, 88, 0.3);
      color: #ffffff;
      font-weight: bold;
      font-size: 18px;
      padding: 12px;
      border-bottom: 2px solid #ffffff;
    }

    .leaderboardRow {
      display: flex;
      color: #ffffff;
      font-size: 18px;
      padding: 12px;
      border-bottom: 1px solid rgba(255, 255, 255, 0.2);
    }

    .leaderboardRow.currentUser {
      background: rgba(88, 216, 88, 0.2);
      font-weight: bold;
    }

    .leaderboardRow:last-child {
      border-bottom: none;
    }

    .leaderboardRank {
      width: 80px;
      text-align: center;
    }

    .leaderboardUser {
      flex: 1;
      text-align: left;
      padding-left: 20px;
    }

    .leaderboardScore {
      width: 100px;
      text-align: center;
    }

    .leaderboardEmpty {
      color: #ffffff;
      font-size: 20px;
      text-align: center;
      padding: 40px;
      background: rgba(0, 0, 0, 0.3);
      border-radius: 12px;
      border: 2px solid #ffffff;
      margin-bottom: 20px;
    }

    .leaderboardActions {
      display: flex;
      gap: 12px;
      justify-content: center;
    }
  </style>
</head>
<body>
  <script type="module" src="src/main.js"></script>
</body>
</html>
